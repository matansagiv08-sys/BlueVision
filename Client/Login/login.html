<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>BlueVision - Login</title>
    <link href="css/Login.css" rel="stylesheet" />
</head>
<body class="login-page">
    <div class="login-card">
        <div class="logo-container">
            <img src="../Images/BlueVisionLOGO.png" alt="BlueVision Logo">
        </div>

        <form>
            <div class="form-group">
                <label>שם משתמש</label>
                <input type="text" placeholder="הזן שם משתמש">
            </div>

            <div class="form-group">
                <label>סיסמה</label>
                <input type="password" placeholder="הזן סיסמה">
            </div>

            <button type="submit" class="login-submit">כניסה למערכת</button>
        </form>

        <div class="forgot-password">
            <a href="#">שכחתי סיסמה</a>
        </div>
    </div>
</body>
</html>
