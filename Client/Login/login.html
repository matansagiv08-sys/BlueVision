<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>BlueVision - Login</title>
    <link href="css/Login.css" rel="stylesheet" />
</head>
<body class="login-page">
    <div class="login-card">
        <div class="logo-container">
            <img src="../Images/BlueVisionLOGO.png" alt="BlueVision Logo">
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label>שם משתמש</label>
                <input id="username" type="text" placeholder="הזן שם משתמש" required>
            </div>

            <div class="form-group">
                <label>סיסמה</label>
                <input id="password" type="password" placeholder="הזן סיסמה" required>
            </div>

            <button type="submit" class="login-submit">כניסה למערכת</button>
        </form>

        <form id="changePasswordForm" class="hidden-block">
            <div class="form-group">
                <label>סיסמה חדשה</label>
                <input id="newPassword" type="password" placeholder="הזן סיסמה חדשה" minlength="6" required>
            </div>

            <div class="form-group">
                <label>אימות סיסמה חדשה</label>
                <input id="confirmNewPassword" type="password" placeholder="הזן שוב את הסיסמה החדשה" minlength="6" required>
            </div>

            <button type="submit" class="login-submit">שמירת סיסמה חדשה</button>
        </form>

        <div id="authMessage" class="auth-message" aria-live="polite"></div>

        <div class="forgot-password">
            <a href="#" id="forgotPasswordLink">שכחתי סיסמה</a>
        </div>
    </div>

    <script src="js/Login.js"></script>
</body>
</html>
