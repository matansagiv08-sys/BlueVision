<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>BlueVision - כניסה</title>
    <link href="../CSS/style.css" rel="stylesheet" />
</head>
<body class="login-page-body">

    <div class="login-card">
        <div class="logo-area">
            <img src="https://via.placeholder.com/180x50?text=BlueVision" alt="BlueVision">
        </div>

        <form>
            <div class="input-group">
                <label>שם משתמש</label>
                <input type="text" placeholder="הזן שם משתמש">
            </div>
            <div class="input-group">
                <label>סיסמה</label>
                <input type="password" placeholder="הזן סיסמה">
            </div>
            <button type="submit" class="btn btn-primary btn-block">כניסה למערכת</button>
        </form>

        <div class="footer-links">
            <a href="#">שכחתי סיסמה</a>
        </div>
    </div>

</body>
</html>
