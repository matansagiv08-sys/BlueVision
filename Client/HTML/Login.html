<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlueVision - התחברות</title>
    <link rel="stylesheet" href="Login.css">
</head>
<body>

    <div class="login-container">
        <div class="login-card">
            <div class="logo-area">
                <img src="https://via.placeholder.com/150x50?text=BlueVision" alt="BlueVision Logo">
            </div>

            <form id="loginForm">
                <div class="input-group">
                    <label for="username">שם משתמש</label>
                    <input type="text" id="username" placeholder="הזן שם משתמש" required>
                </div>

                <div class="input-group">
                    <label for="password">סיסמה</label>
                    <input type="password" id="password" placeholder="הזן סיסמה" required>
                </div>

                <button type="submit" class="login-btn">כניסה למערכת</button>
            </form>

            <div class="footer-links">
                <a href="#">שכחתי סיסמה</a>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
