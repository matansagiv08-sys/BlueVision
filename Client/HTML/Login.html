<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>BlueVision - כניסה</title>
    <link href="../CSS/Login.css" rel="stylesheet" />
</head>
<body>
    <div class="login-card">
        <div class="logo-area">
            <img src="logo.png" alt="BlueVision">
        </div>
        <form>
            <div class="input-group">
                <label>שם משתמש</label>
                <input type="text" placeholder="הזן שם משתמש">
            </div>
            <div class="input-group">
                <label>סיסמה</label>
                <input type="password" placeholder="הזן סיסמה">
            </div>
            <button type="submit" class="login-btn">כניסה למערכת</button>
        </form>
        <div class="footer-links">
            <a href="#">שכחתי סיסמה</a>
        </div>
    </div>
</body>
</html>


<link href="../CSS/styleInventory.css" rel="stylesheet" />
