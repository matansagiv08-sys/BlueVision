<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>BlueVision - דוח ראשי</title>
    <link href="../CSS/styleInventory.css" rel="stylesheet" />
</head>
<body>
    <header class="header">
        <div class="logo"><img src="logo.png" alt="Logo"></div>
        <nav class="nav">
            <a href="#">כמויות מעץ מוצר</a>
            <a href="#">מעקב הזמנות רכש</a>
            <a href="#">מלאי כולל</a>
            <a href="#">בדיקת מלאי</a>
            <a href="#" class="active">דוח ראשי</a>
        </nav>
        <div class="user-info">
            <div class="text">
                <strong>דניה</strong>
                <span>מנהלת תפ"י</span>
            </div>
            <img src="avatar.jpg" class="avatar">
        </div>
    </header>

    <main class="container">
        <section class="top-bar">
            <div class="title">
                <h1>דוח ראשי</h1>
                <p>סקירה מקיפה של מצב המלאי, חוסרים והזמנות רכש</p>
            </div>
            <div class="actions">
                <button class="btn-edit">ערוך דוח</button>
                <button class="btn-export">ייצא דוח</button>
            </div>
        </section>

        <div class="grid">
            <div class="card"><div class="card-h">⋮⋮ פילוח חוסרים לפי סוג כטב"ם</div><div class="chart-box">גרף פילוח</div></div>
            <div class="card"><div class="card-h">⋮⋮ סטטוס מלאי לפי קטגוריות</div><div class="chart-box">גרף סטטוס</div></div>
            <div class="card"><div class="card-h">⋮⋮ סטטוס הזמנות רכש</div><div class="chart-box">גרף הזמנות</div></div>
            <div class="card"><div class="card-h">⋮⋮ חלקים חסרים לייצור</div><div class="chart-box">גרף ייצור</div></div>
        </div>
    </main>
</body>
</html>
