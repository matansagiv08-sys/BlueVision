<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>BlueVision - דוח ראשי</title>
    <link href="../CSS/style.css" rel="stylesheet" />
</head>
<body>

    <header class="main-header">
        <div class="header-logo">
            <img src="https://via.placeholder.com/150x40?text=BlueVision" alt="Logo">
        </div>

        <nav class="top-nav">
            <a href="#" class="nav-pill">כמויות מעץ מוצר</a>
            <a href="#" class="nav-pill">מעקב הזמנות רכש</a>
            <a href="#" class="nav-pill">מלאי כולל</a>
            <a href="#" class="nav-pill">בדיקת מלאי</a>
            <a href="#" class="nav-pill active">דוח ראשי</a>
        </nav>

        <div class="user-profile">
            <div class="user-text">
                <span class="user-name">דניה</span>
                <span class="user-role">מנהלת תפ"י</span>
            </div>
            <div class="avatar">
                <img src="https://via.placeholder.com/40" alt="User">
            </div>
        </div>
    </header>

    <main class="content-container">
        <section class="page-intro">
            <div>
                <h1 style="margin:0; color:var(--primary-blue);">דוח ראשי</h1>
                <p style="color:var(--text-muted);">סקירה מקיפה של מצב המלאי</p>
            </div>
            <div style="display:flex; gap:10px;">
                <button class="btn btn-outline">ערוך דוח</button>
                <button class="btn btn-primary">ייצא דוח</button>
            </div>
        </section>

        <div class="dashboard-grid">
            <div class="dashboard-card">
                <div class="card-top"><h3>פילוח חוסרים לפי סוג כטב"ם</h3><span>⋮⋮</span></div>
                <div class="chart-area">גרף חוסרים</div>
            </div>
            <div class="dashboard-card">
                <div class="card-top"><h3>סטטוס מלאי לפי קטגוריות</h3><span>⋮⋮</span></div>
                <div class="chart-area">גרף מלאי</div>
            </div>
            <div class="dashboard-card">
                <div class="card-top"><h3>סטטוס הזמנות רכש</h3><span>⋮⋮</span></div>
                <div class="chart-area">גרף הזמנות</div>
            </div>
            <div class="dashboard-card">
                <div class="card-top"><h3>חלקים חסרים לייצור</h3><span>⋮⋮</span></div>
                <div class="chart-area">גרף ייצור</div>
            </div>
        </div>
    </main>

</body>
</html>
