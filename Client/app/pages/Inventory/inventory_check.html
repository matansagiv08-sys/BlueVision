<div class="inventory-check-page">
    <div class="check-header">
        <div class="custom-slider-toggle">
            <button class="slider-btn active" id="mode-uav" onclick="window.switchCheckMode('uav')">
                כטב"מים
            </button>
            <button class="slider-btn" id="mode-body" onclick="window.switchCheckMode('body')">
                גופים
            </button>
        </div>
    </div>

    <div id="check-rows-container" class="check-rows-container">
    </div>

    <div class="check-actions">
        <button class="btn-secondary btn-add-row" onclick="window.addNewCheckRow()">
            הוסף
        </button>
        <button id="btn-calculate" class="btn-save" disabled onclick="window.navigateToResults()">
            חשב חוסרים במלאי
        </button>
    </div>
</div>
