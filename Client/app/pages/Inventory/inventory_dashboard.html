<div class="dashboard-container">
    <div class="global-toolbar dashboard-toolbar">
        <div class="filter-actions dashboard-view-actions">
            <button class="dashboard-action-btn dashboard-action-primary" onclick="openEditDashboardModal()">
                <span></span> הוספת גרף ללוח
            </button>
            <button class="dashboard-action-btn dashboard-action-secondary" id="arrangeDashboardBtn" onclick="enterArrangeDashboard()">
                סידור הדשבורד
            </button>
            <button class="dashboard-action-btn dashboard-action-secondary" onclick="exportDashboardToExcel()">
                ייצוא דוח לאקסל
            </button>
        </div>
        <div class="arrange-actions" id="arrangeActions" style="display:none;">
            <button class="dashboard-action-btn dashboard-action-primary" onclick="saveDashboardLayout()">שמור סידור</button>
            <button class="dashboard-action-btn dashboard-action-secondary" onclick="cancelArrangeDashboard()">ביטול</button>
            <button class="dashboard-action-btn dashboard-action-muted" onclick="resetDashboardLayout()">איפוס סידור</button>
        </div>
    </div>

    <div class="dashboard-arrange-banner" id="dashboardArrangeBanner" style="display:none;">
        מצב סידור פעיל - ניתן לגרור כרטיסים ולשנות גדלים
    </div>

    <div class="dashboard-grid-shell" id="dashboardGridShell">
        <div class="dashboard-grid" id="chartsGrid">
        </div>
    </div>
</div>

<div id="dashboardEditModal" class="modal-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 9999; justify-content: center; align-items: center;">
    <div class="modal-content large-modal" style="background: white; border-radius: 8px; width: 90%; max-width: 950px; overflow: hidden; display: flex; flex-direction: column; max-height: 90vh;">

        <div class="modal-header-blue" style="background: #0c2340; color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center;">
            <h2 style="margin: 0; font-size: 18px;">ניהול ועריכת גרפים באמצעות AI</h2>
            <button class="close-btn" onclick="closeEditDashboardModal()" style="background: none; border: none; color: white; font-size: 24px; cursor: pointer;">&times;</button>
        </div>

        <div class="modal-body dashboard-modal-layout" style="padding: 20px; display: flex; gap: 20px; overflow-y: auto; direction: rtl;">

            <div class="modal-section ai-generator-section" style="flex: 1; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; padding: 15px;">
                <h3 style="margin-top: 0; color: #0c2340; font-size: 16px; margin-bottom: 15px;">🪄 יצירת גרף חדש בשפה חופשית</h3>

                <div class="form-group" style="margin-bottom: 15px;">
                    <label style="display: block; margin-bottom: 5px; font-weight: 600; font-size: 14px;">מה ברצונך לבדוק במערכת המלאי?</label>
                    <textarea id="aiPromptInput" class="standard-input" rows="5" style="width: 100%; min-height: 110px; max-height: 220px; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; resize: vertical; overflow-y: auto;" placeholder="לדוגמה: כמה פריטים יש מכל דגם של כטב''ם במלאי?"></textarea>
                </div>

                <button id="generateAiChartBtn" class="standard-button" style="width: 100%; background-color: #0c2340; color: white; padding: 10px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600;" onclick="generateAiChart()">
                    <span class="ai-create-spinner" hidden></span>
                    <span class="ai-create-button-text">ייצר גרף בהתאמה אישית</span>
                </button>
                <div id="aiCreateLoadingText" class="ai-create-loading-text" hidden>המערכת יוצרת את הגרף, זה עשוי לקחת כמה שניות...</div>

                <div id="previewChartContainer" class="preview-chart-box" style="display: none; margin-top: 20px; background: white; border: 1px solid #cbd5e1; border-radius: 6px; padding: 15px;">
                    <h4 style="margin-top: 0; color: #0c2340; font-size: 14px; margin-bottom: 10px;">תצוגה מקדימה של הגרף:</h4>
                    <div class="chart-wrapper" style="position: relative; height: 200px; width: 100%;">
                        <canvas id="previewChartCanvas"></canvas>
                    </div>
                    <div id="previewTableContainer" class="dashboard-table-wrap" style="display: none;"></div>
                    <div id="previewMessage" class="dashboard-preview-message" style="display: none;"></div>

                    <div class="form-group" style="margin-top: 15px; margin-bottom: 10px;">
                        <label style="display: block; margin-bottom: 5px; font-weight: 600; font-size: 13px;">תן שם לגרף החדש שלך:</label>
                        <input type="text" id="newChartTitleInput" class="standard-input" style="width: 100%; padding: 8px; border: 1px solid #cbd5e1; border-radius: 6px;" placeholder="לדוגמה: כמות פריטים לפי דגם">
                    </div>

                    <button class="standard-button" style="width: 100%; background-color: #10b981; color: white; padding: 10px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600;" onclick="saveGeneratedChart()">
                        💾 שמור גרף והוסף לדשבורד
                    </button>
                </div>
            </div>

        </div>
    </div>
</div>

<div id="dashboardCardModal" class="modal-overlay" style="display:none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.55); z-index: 10000; justify-content:center; align-items:center;">
    <div class="modal-content large-modal" style="background:white; border-radius:8px; width:90%; max-width:1100px; max-height:90vh; overflow:hidden; display:flex; flex-direction:column;">
        <div class="modal-header-blue" style="background:#0c2340; color:white; padding:12px 16px; display:flex; justify-content:space-between; align-items:center;">
            <h3 id="dashboardCardModalTitle" style="margin:0; font-size:16px;">תצוגה</h3>
            <button class="close-btn" onclick="closeDashboardCardModal()" style="background:none; border:none; color:white; font-size:22px; cursor:pointer;">&times;</button>
        </div>
        <div style="padding:16px; overflow:auto; direction:rtl;">
            <div id="dashboardCardModalChartWrap" style="display:none; height:420px; position:relative;">
                <canvas id="dashboardCardModalCanvas"></canvas>
            </div>
            <div id="dashboardCardModalTableWrap" class="dashboard-table-wrap" style="display:none;"></div>
            <pre id="dashboardCardModalQueryWrap" style="display:none; background:#0f172a; color:#e2e8f0; padding:12px; border-radius:8px; overflow:auto; white-space:pre-wrap;"></pre>
        </div>
    </div>
</div>
