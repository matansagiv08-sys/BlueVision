<div class="all-inventory-page">
    <div class="inventory-toolbar" style="margin-bottom: 25px;">
        <div class="search-box">
            <input type="text" id="inventorySearch" placeholder="חפש מק״ט או תיאור..." oninput="window.filterInventory()">
            <span class="search-icon">🔍</span>
        </div>

        <div class="filter-group">
            <select id="platformFilter" onchange="window.filterInventory()">
                <option value="all">כל הפלטפורמות</option>
                <option value="WB">WB</option>
                <option value="TBV">TBV</option>
                <option value="Puma">Puma</option>
            </select>
            <button class="btn-sort" onclick="window.sortInventory()">
                מיון ⇅
            </button>
        </div>
    </div>

    <div class="table-container">
        <table class="generic-data-table">
            <thead>
                <tr>
                    <th>מק״ט פריט</th>
                    <th>תיאור מק״ט</th>
                    <th>פלטפורמה</th>
                    <th>מכלול אבא ישיר</th>
                    <th>כמות במלאי</th>
                </tr>
            </thead>
            <tbody id="inventory-table-body">
            </tbody>
        </table>
    </div>
</div>

<div id="genericModal" class="modal-overlay" onclick="window.closeGenericModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <div class="modal-header-blue">
            <h2 id="modalTitle">פרטים מלאים על הפריט</h2>
            <button class="close-btn" onclick="window.closeGenericModal()" style="background:none; border:none; color:white; font-size:24px; cursor:pointer;">&times;</button>
        </div>
        <div id="modalBody" class="modal-body">
        </div>
        <div class="modal-footer">
            <button class="btn-modal btn-cancel" onclick="window.closeGenericModal()">ביטול</button>
            <button id="modalSubmitBtn" class="btn-modal btn-save" disabled onclick="window.handleModalSubmit()">אישור</button>
        </div>
    </div>
</div>
