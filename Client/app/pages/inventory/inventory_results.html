<div class="inventory-results-page">
    <div class="top-action-bar">
        <button class="btn-secondary" onclick="window.backToCheck()">
            <span>←</span> חזור לעריכת בדיקה
        </button>
        <button class="btn-primary" onclick="window.exportToExcel()">
            <span>📄</span> ייצא דו"ח (Excel)
        </button>
    </div>

    <div class="summary-cards-container">
        <div class="generic-card summary-card active-shortage">
            <div class="card-content">
                <span class="card-label">סה"כ פריטים בחוסר</span>
                <div class="card-value" id="total-shortage">0</div>
                <span class="card-sub-label" id="total-items-count">0 יחידות</span>
            </div>
        </div>

        <div class="generic-card summary-card">
            <div class="card-content">
                <span class="card-label">עלות כוללת משוערת</span>
                <div class="card-value" id="total-cost">₪ 0</div>
                <span class="card-sub-label">לפי מחירון אחרון</span>
            </div>
        </div>

        <div class="generic-card summary-card">
            <div class="card-content">
                <span class="card-label">מוכן לייצור</span>
                <div class="card-value success" id="ready-to-prod">-</div>
                <span class="card-sub-label">לא מחושב בדוח זה</span>
            </div>
        </div>
    </div>

    <div class="global-toolbar">
        <div class="search-container">
            <input type="text" id="resultsSearch" class="standard-input" placeholder="חפש מק״ט או תיאור..." oninput="window.filterResults()">
            <span class="search-icon-inside">🔍</span>
        </div>

        <div class="filter-actions">
            <select id="platformFilter" onchange="window.filterResults()">
                <option value="all">כל הפלטפורמות</option>
            </select>
        </div>
    </div>

    <div class="table-container">
        <table class="generic-data-table clickable-table">
            <thead>
                <tr>
                    <th>קוד פריט</th>
                    <th>תיאור מק"ט</th>
                    <th>כמות קיימת</th>
                    <th>כמות מבוקשת</th>
                    <th class="col-highlight">חוסרים</th>
                    <th>יחידת מידה</th>
                    <th>ספק</th>
                    <th>מחיר ליחידה (₪)</th>
                    <th>פלטפורמות</th>
                </tr>
            </thead>
            <tbody id="results-table-body">
            </tbody>
        </table>
    </div>
</div>
