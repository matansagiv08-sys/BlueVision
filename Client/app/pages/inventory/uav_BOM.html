<div class="uav-bom-page">
    <div id="stockImportOverlay" class="stock-import-overlay" style="display:none;">
        <div class="stock-child-spinner" aria-hidden="true"></div>
    </div>

    <div id="stockChildContent">
    <div class="bom-selection-header">
        <div id="bomPlaneToggle" class="custom-slider-toggle model-selection-toggle">
        </div>
    </div>

    <div class="global-toolbar">
        <div class="search-container">
            <input type="text" id="bomSearch" class="standard-input" placeholder="חפש רכיב או מק״ט בעץ המוצר..." oninput="window.filterBomTable()">
            <span class="search-icon-inside">🔍</span>
        </div>

        <div class="filter-actions">
            <select id="bomMeasureUnitFilter" onchange="window.filterBomTable()">
                <option value="" selected disabled>יחידת מידה</option>
                <option value="all">הכל</option>
            </select>

            <select id="bomWarehouseFilter" onchange="window.filterBomTable()">
                <option value="" selected disabled>מחסן</option>
                <option value="all">הכל</option>
            </select>

            <select id="bomLevelFilter" onchange="window.filterBomTable()">
                <option value="" selected disabled>רמת BOM</option>
                <option value="all">הכל</option>
            </select>

            <select id="bomBuyMethodFilter" onchange="window.filterBomTable()">
                <option value="" selected disabled>שיטת רכישה</option>
                <option value="all">הכל</option>
            </select>

            <select id="bomBodyPlaneFilter" onchange="window.filterBomTable()">
                <option value="" selected disabled>כל גוף/כנף</option>
                <option value="all">הכל</option>
            </select>

            <button class="btn-secondary-action clear-filters-btn" onclick="window.clearBomFilters()">
                נקה
            </button>
        </div>
    </div>

    <div class="bom-tree-actions-wrap">
        <div id="bomTreeActions" class="bom-tree-actions">
            <button class="btn-secondary-action" onclick="window.expandAllBomTree()">פתח הכל</button>
            <button class="btn-secondary-action" onclick="window.collapseAllBomTree()">כווץ הכל</button>
        </div>
    </div>

    <div class="table-container">
        <table id="bomDataTable" class="generic-data-table bom-data-table">
            <colgroup>
                <col class="bom-col-level">
                <col class="bom-col-sku">
                <col class="bom-col-name">
                <col class="bom-col-qty">
                <col class="bom-col-unit">
                <col class="bom-col-warehouse">
                <col class="bom-col-buy-method">
                <col class="bom-col-body-plane">
            </colgroup>
            <thead>
                <tr>
                    <th class="bom-col-level">רמת BOM</th>
                    <th class="bom-col-sku">מק&quot;ט</th>
                    <th class="bom-col-name">שם פריט</th>
                    <th class="bom-col-qty">כמות</th>
                    <th class="bom-col-unit">יחידת מידה</th>
                    <th class="bom-col-warehouse">מחסן</th>
                    <th class="bom-col-buy-method">שיטת רכש</th>
                    <th class="bom-col-body-plane">גוף או כטב"מ</th>
                </tr>
            </thead>
            <tbody id="bom-table-body">
            </tbody>
        </table>
    </div>
    </div>
</div>
