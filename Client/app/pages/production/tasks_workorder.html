<div class="tasks-workorder-page">
    <div class="workstation-slider-container">
        <div class="custom-slider-toggle" id="stationsSlider">
            <button class="slider-btn active pill-blue" onclick="window.filterByStation('all', this)">כל התחנות</button>
        </div>
    </div>

    <div class="global-toolbar">
        <div class="search-container">
            <input type="text" id="taskSearch" class="standard-input" placeholder="חפש פק״ע, מק״ט, שם פריט, פרויקט או סיריאלי..." oninput="window.filterWorkOrder()">
        </div>

        <div class="toolbar-actions">
            <select id="urgencyFilter" class="standard-input urgency-select" onchange="window.filterWorkOrder()">
                <option value="all">כל הדחיפויות</option>
                <option value="critical">קריטי</option>
                <option value="high">גבוה</option>
            </select>

            <button id="resetAlgoBtn" class="btn-cancel" onclick="window.optimizeRoute()" disabled>איפוס לאלגוריתם</button>
            <button id="saveOrderBtn" class="btn-save" onclick="window.saveWorkOrder()" disabled>שמור שינויים</button>
        </div>
    </div>

    <div class="table-container">
        <table class="generic-data-table">
            <thead>
                <tr>
                    <th class="drag-col"></th>
                    <th>מספר פק״ע</th>
                    <th>מק״ט / קוד פריט</th>
                    <th>שם פריט</th>
                    <th>מספר סריאלי</th>
                    <th>סוג כטב״ם</th>
                    <th>פרויקט</th>
                    <th>תאריך יעד פרויקט</th>
                    <th>תאריך יעד פריט</th>
                    <th>מספר מטוס</th>
                    <th class="station-header">תחנה נוכחית</th>
                    <th>ציון דחיפות</th>
                </tr>
            </thead>
            <tbody id="tasksTableBody">
            </tbody>
        </table>
    </div>
</div>
