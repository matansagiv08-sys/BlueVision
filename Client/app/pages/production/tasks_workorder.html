<div class="tasks-workorder-page">
    <div class="workstation-slider-container">
        <div class="custom-slider-toggle" id="stationsSlider"></div>
    </div>

    <div class="global-toolbar">
        <div class="workorder-filter-row">
            <div class="search-container workorder-search-wrap">
                <input type="text" id="taskSearch" class="standard-input" placeholder="חפש פק״ע, מק״ט, שם פריט, פרויקט או סיריאלי..." oninput="window.filterWorkOrder()">
            </div>

            <select id="planeTypeFilter" class="standard-input workorder-filter-select" onchange="window.filterWorkOrder()">
                <option value="all">כל סוגי הכטב״ם</option>
            </select>

            <select id="projectFilter" class="standard-input workorder-filter-select" onchange="window.filterWorkOrder()">
                <option value="all">כל הפרויקטים</option>
            </select>

            <select id="lateStatusFilter" class="standard-input workorder-filter-select" onchange="window.filterWorkOrder()">
                <option value="all">מצב זמנים</option>
                <option value="late">באיחור</option>
                <option value="onTime">בזמן</option>
            </select>

            <select id="planeNumberFilter" class="standard-input workorder-filter-select" onchange="window.filterWorkOrder()">
                <option value="all">כל מספרי המטוס</option>
            </select>

            <button id="saveOrderBtn" class="btn-save" onclick="window.saveWorkOrder()" disabled>שמור שינויים</button>
            <button id="resetAlgoBtn" class="btn-cancel" onclick="window.optimizeRoute()" disabled>איפוס לאלגוריתם</button>
            <button class="btn-secondary-action clear-filters-btn" onclick="window.clearWorkOrderFilters()">נקה סינונים</button>
        </div>
    </div>

    <div class="table-container">
        <table class="generic-data-table">
            <thead>
                <tr>
                    <th class="drag-col"></th>
                    <th>מספר פק״ע</th>
                    <th>מק״ט / קוד פריט</th>
                    <th>שם פריט</th>
                    <th>מספר סריאלי</th>
                    <th>סוג כטב״ם</th>
                    <th>פרויקט</th>
                    <th>תאריך יעד פרויקט</th>
                    <th>תאריך יעד פריט</th>
                    <th>מספר מטוס</th>
                    <th class="station-header">תחנה נוכחית</th>
                    <th>ציון דחיפות</th>
                </tr>
            </thead>
            <tbody id="tasksTableBody">
            </tbody>
        </table>
    </div>
</div>
