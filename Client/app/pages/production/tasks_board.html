<div class="tasks-board-page">
    <div class="global-toolbar">
        <div class="search-container">
            <input type="text" id="filter-search" class="standard-input" placeholder="חפש פקע, מקט או שם פריט..." oninput="window.applyFilters()">
            <span class="search-icon-inside">🔍</span>
        </div>

        <div class="filter-actions">
            <select id="filter-project" class="standard-select" onchange="window.applyFilters()">
                <option value="">כל הפרויקטים</option>
            </select>

            <select id="filter-stage" class="standard-select" onchange="window.applyFilters()">
                <option value="">התחנה שלי (הכל)</option>
            </select>

            <div class="checkbox-filter-container">
                <input type="checkbox" id="filter-not-done" onchange="window.applyFilters()">
                <label for="filter-not-done">רק משימות שלא הסתיימו</label>
            </div>

            <button class="btn-secondary-action clear-filters-btn" onclick="window.clearAllFilters()">
                נקה
            </button>
        </div>
    </div>

    <div id="tasks-board-container"></div>
</div>

<div id="tbStatusModal" class="modal-overlay" onclick="window.closeTaskStatusModal()">
    <div class="modal-content tb-status-modal" onclick="event.stopPropagation()">
        <div class="modal-header-blue" style="background: #0c2340; padding: 12px 16px;">
            <h2 id="tbModalTitle" style="margin:0; font-size:1.2rem;">עדכון סטטוס תחנה</h2>
            <button class="close-btn" onclick="window.closeTaskStatusModal()" style="background:none; border:none; color:white; font-size:1.5rem; cursor:pointer;">&times;</button>
        </div>

        <div id="modalBody" class="modal-body tb-status-modal-body" style="padding: 16px;">
            <div id="modalTaskInfo" class="tb-status-info-card" style="background: #f8fafc; border-radius: 8px; padding: 12px; margin-bottom: 14px; font-size: 0.9rem; color: #1e293b;">
            </div>

            <label class="tb-label" style="display:block; margin-bottom:8px;">בחר סטטוס חדש</label>

            <div id="statusButtonsContainer" class="status-grid-new" style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px;">
            </div>

            <hr style="border:0; border-top:1px solid #e2e8f0; margin: 14px 0;" />

            <div class="modal-inputs-section">
                <label class="tb-label" style="display:block; margin-bottom:8px;">הערות (אופציונלי)</label>
                <textarea id="statusCommentInput" class="generic-input" rows="3" placeholder="הוסף הערות או פרטים נוספים..." style="width:100%; padding:10px; border:1px solid #cbd5e1; border-radius:8px; resize:vertical;"></textarea>

                <div id="timeInputContainer" style="display:none; margin-top:10px;">
                    <label id="timeLabel" class="tb-label" style="display:block; margin-bottom:5px;"></label>
                    <input type="datetime-local" id="userTimeInput" class="generic-input" style="width:100%; padding:10px; border:1px solid #cbd5e1; border-radius:8px;">
                </div>
            </div>
        </div>

        <div class="modal-footer tb-status-modal-footer" style="padding: 12px 16px; background: #f8fafc; border-top: 1px solid #e2e8f0; display:flex; justify-content:flex-end; gap:8px;">
            <button type="button" class="btn-modal btn-save" id="tbModalSubmitBtn" disabled style="background:#0c2340; color:white; padding:10px 20px; border-radius:8px; border:none; font-weight:600; cursor:pointer;">שמור</button>
            <button type="button" class="btn-modal btn-cancel" onclick="window.closeTaskStatusModal()" style="background:white; color:#64748b; padding:10px 20px; border-radius:8px; border:1px solid #e2e8f0; font-weight:600; cursor:pointer;">ביטול</button>
        </div>
    </div>
</div>

<div id="confirmModal" class="confirm-modal-overlay">
    <div class="confirm-modal-content">
        <div class="confirm-modal-header" id="confirmTitle">אישור פעולה</div>
        <div class="confirm-modal-body" id="confirmMessage">האם אתה בטוח?</div>
        <div class="confirm-modal-footer">
            <button class="btn-confirm btn-confirm-yes" id="confirmYesBtn">כן, בצע</button>
            <button class="btn-confirm btn-confirm-no" id="confirmNoBtn">ביטול</button>
        </div>
    </div>
</div>
