<div class="add-parts-production-page">
    <div class="generic-card form-wrapper">
        <div id="form-feedback-message" class="form-feedback-message" style="display:none;"></div>
        <form id="production-form" class="standard-grid-form">
            <section class="form-section-card">
                <h3 class="section-title">פרטי פרויקט / כלי</h3>
                <div class="section-grid two-cols">
                    <div class="form-group">
                        <label>שייך לפרויקט</label>
                        <div class="input-with-action">
                            <select id="project-select">
                                <option value="">בחר פרויקט...</option>
                            </select>
                            <input type="text" id="project-new" style="display:none;" placeholder="שם פרויקט חדש">
                            <button type="button" class="toggle-btn" onclick="toggleInput('project')">+</button>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>שם פרויקט</label>
                        <input type="text" id="project-display-name" readonly class="readonly-input" placeholder="ייבחר אוטומטית" />
                    </div>

                    <div class="form-group" id="project-due-date-group" style="display:none;">
                        <label>תאריך יעד לפרויקט חדש <span class="req">*</span></label>
                        <input type="date" id="project-due-date-input" disabled>
                    </div>

                    <div class="form-group" id="project-priority-group" style="display:none;">
                        <label>עדיפות לפרויקט חדש <span class="req">*</span></label>
                        <select id="project-priority-select" disabled>
                            <option value="">בחר עדיפות...</option>
                        </select>
                    </div>
                </div>
            </section>

            <section class="form-section-card">
                <h3 class="section-title">פרטי פריט</h3>
                <div class="section-grid two-cols">
                    <div class="form-group">
                        <label>קוד פריט / מק״ט <span class="req">*</span></label>
                        <select id="item-code-select" required>
                            <option value="">בחר מק״ט...</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>שם פריט</label>
                        <input type="text" id="item-name-input" readonly class="readonly-input" placeholder="ייבחר אוטומטית" />
                    </div>

                    <div class="form-group">
                        <label>סוג כטב״ם <span class="req">*</span></label>
                        <select id="plane-type-select" required>
                            <option value="">בחר סוג...</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>מספר עבודה (Work Order)</label>
                        <input type="text" id="work-order-input" list="work-orders-list" placeholder="בחר או הקלד מספר עבודה">
                        <datalist id="work-orders-list"></datalist>
                    </div>

                    <div class="form-group">
                        <label>עדיפות לייצור</label>
                        <select id="priority-select"></select>
                    </div>

                    <div class="form-group">
                        <label>תאריך יעד לפריט</label>
                        <input type="date" id="due-date-input">
                    </div>
                </div>
            </section>

            <section class="form-section-card">
                <h3 class="section-title">כמות ופריטים למעקב</h3>
                <div class="section-grid two-cols">
                    <div class="form-group">
                        <label>כמות לייצור <span class="req">*</span></label>
                        <input type="number" id="qty-input" value="1" min="1" required>
                    </div>
                </div>

                <div id="single-unit-fields" class="section-grid two-cols">
                    <div class="form-group">
                        <label>מספר סריאלי <span class="req">*</span></label>
                        <input type="number" id="serial-number-input" placeholder="לדוגמה: 50021" required>
                    </div>
                    <div class="form-group">
                        <label>מספר מטוס לפריט</label>
                        <input type="text" id="single-unit-plane-input" list="tracked-plane-list" placeholder="מספר מטוס לפריט (אופציונלי)">
                    </div>
                </div>

                <div id="multi-unit-wrapper" class="multi-unit-wrapper" style="display:none;">
                    <div class="multi-unit-hint">הכנס מספר סריאלי ומספר מטוס לכל יחידה בנפרד</div>
                    <div class="table-container tracked-items-table-wrap">
                        <table class="generic-data-table tracked-items-table">
                            <thead>
                                <tr>
                                    <th>#</th>
                                    <th>מספר סריאלי <span class="req">*</span></th>
                                    <th>מספר מטוס</th>
                                </tr>
                            </thead>
                            <tbody id="tracked-units-body"></tbody>
                        </table>
                    </div>
                </div>
                <datalist id="tracked-plane-list"></datalist>
            </section>

            <section class="form-section-card">
                <h3 class="section-title">הערות</h3>
                <div class="form-group full-width">
                    <textarea id="comments-input" rows="3"></textarea>
                </div>
            </section>

            <div class="form-footer-actions">
                <button type="button" class="btn-secondary" onclick="window.history.back()">ביטול</button>
                <button type="submit" class="btn-primary">💾 שמור והוסף לייצור</button>
            </div>
        </form>
    </div>
</div>
