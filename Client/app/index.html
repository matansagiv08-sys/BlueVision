<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlueVision</title>

    <link rel="stylesheet" href="./css/styles.css">

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <script src="../JS/ajaxCalls.js"></script>

    <script>
        server = "https://localhost:7296/";
    </script>

    <script defer src="./js/app.js"></script>
</head>
<body class="mode-production">

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-top">
            <button id="sidebarToggle" class="sidebar-toggle-btn">☰</button>
        </div>
        <nav class="sidebar-nav">
            <a href="#/production/tasks_board" data-route>
                <span class="icon">🏭</span>
                <span class="label">Production</span>
            </a>
            <a href="#/inventory/inventory_dashboard" data-route>
                <span class="icon">📦</span>
                <span class="label">Stock</span>
            </a>
        </nav>
        <div class="sidebar-user">
            <div class="user-avatar">ד</div>
            <div class="user-info">
                <div class="user-name">Dana</div>
                <div class="user-role">Manager</div>
            </div>
        </div>
    </aside>

    <div class="main">
        <header class="topbar">
            <div class="topbar-inner">
                <img src="./Images/BlueVisionLOGO.png" class="topbar-logo" alt="BlueVision" />
                <div class="top-menu">
                    <a href="#/production/tasks_board" data-route class="tab-production">לוח משימות</a>
                    <a href="#/production/projects_status" data-route class="tab-production">סטטוס פרויקטים</a>
                    <a href="#/production/tasks_order" data-route class="tab-production">ניהול סדר עבודה</a>
                    <a href="#/production/add_item_to_production" data-route class="tab-production">הוספת פריט לייצור</a>
                    <a href="#/production/monthly_dashboard" data-route class="tab-production">דוח חודשי</a>
                    <a href="#/inventory/inventory_dashboard" data-route class="tab-inventory">דוח מלאי</a>
                    <a href="#/inventory/inventory_check" data-route class="tab-inventory">בדיקת מלאי</a>
                    <a href="#/inventory/all_inventory" data-route class="tab-inventory">מלאי כולל</a>
                    <a href="#/inventory/orders_tracking" data-route class="tab-inventory">מעקב הזמנות רכש</a>
                    <a href="#/inventory/uav_BOM" data-route class="tab-inventory">כמויות מעץ מוצר</a>
                </div>
            </div>
        </header>

        <section class="page-header">
            <h1 id="pageTitle">טוען...</h1>
            <p id="pageSubtitle"></p>
        </section>

        <main id="app"></main>

    </div>
    <div id="genericModal" class="modal-overlay" onclick="window.closeGenericModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-header-blue">
                <h2 id="modalTitle">פרטים מלאים</h2>
                <button class="close-btn" onclick="window.closeGenericModal()" style="background:none; border:none; color:white; font-size:24px; cursor:pointer;">&times;</button>
            </div>
            <div id="modalBody" class="modal-body">
            </div>
    <div class="modal-footer">
        <button class="btn-cancel" onclick="window.closeGenericModal()">ביטול</button>
        <button id="modalSubmitBtn" class="btn-save" disabled>שמור שינויים</button>
    </div>
        </div>
    </div>
</body>
</html>
