<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlueVision</title>
    <link rel="stylesheet" href="./css/styles.css">
    <script defer src="./js/app.js"></script>
</head>
<body class="mode-production">

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-top">
            <button id="sidebarToggle" class="toggle-btn">☰</button>
        </div>
        <nav class="sidebar-nav">
            <a href="#/production/tasks_board" data-route>
                <span class="icon">🏭</span>
                <span class="label">Production</span>
            </a>
            <a href="#/inventory/inventory_dashboard" data-route>
                <span class="icon">📦</span>
                <span class="label">Stock</span>
            </a>
        </nav>
        <div class="sidebar-user">
            <div class="user-avatar">ד</div>
            <div class="user-info">
                <div class="user-name">Dana</div>
                <div class="user-role">Manager</div>
            </div>
        </div>
    </aside>

    <div class="main">
        <header class="topbar">
            <div class="topbar-inner">
                <img src="./Images/BlueVisionLOGO.png" class="topbar-logo" alt="BlueVision" />
                <div class="top-menu">
                    <a href="#/production/tasks_board" data-route class="tab-production">לוח משימות</a>
                    <a href="#/production/projects_status" data-route class="tab-production">סטטוס פרויקטים</a>
                    <a href="#/production/tasks_order" data-route class="tab-production">ניהול סדרר עבודה</a>
                    <a href="#/production/add_parts_to_production" data-route class="tab-production">הוספת חלק לייצור</a>
                    <a href="#/production/monthly_dashboard" data-route class="tab-production">דוח חודשי</a>
                    <a href="#/inventory/inventory_dashboard" data-route class="tab-inventory">דוח מלאי</a>
                    <a href="#/inventory/inventory_check" data-route class="tab-inventory">בדיקת מלאי</a>
                    <a href="#/inventory/all_inventory" data-route class="tab-inventory">מלאי כולל</a>
                    <a href="#/inventory/orders_tracking" data-route class="tab-inventory">מעקב הזמנות רכש</a>
                    <a href="#/inventory/main_dashboard" data-route class="tab-inventory">כמויות מעץ מוצר</a>
                    <a href="#/inventory/main_dashboard" data-route class="tab-inventory">מלאי כולל</a>
                </div>
            </div>
        </header>

        <section class="page-header">
            <h1 id="pageTitle">טוען...</h1>
            <p id="pageSubtitle"></p>
        </section>

        <main id="app"></main>
        <div id="statusModal" class="modal-overlay" style="display:none;">
            <div class="status-modal-v2">
                <div class="status-header-blue">עדכון סטטוס תחנה</div>
                <div class="modal-body">
                    <div class="task-info-card"></div> <div class="status-selection-grid">
                        <button class="status-opt-btn green-active">בוצע</button>
                        <button class="status-opt-btn">בתהליך</button>
                        <button class="status-opt-btn" style="color:red;">עצור כ"א</button>
                        <button class="status-opt-btn" style="color:orange;">עצור הנדסית</button>
                        <button class="status-opt-btn">אחר</button>
                    </div>

                    <div style="margin-top:15px;">
                        <label style="display:block; font-size:0.8rem; margin-bottom:5px;">זמן סיום</label>
                        <input type="datetime-local" class="modal-input">

                        <label style="display:block; font-size:0.8rem; margin:10px 0 5px;">הערות</label>
                        <textarea class="modal-input" style="height:60px;"></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn-save" onclick="closeStatusModal()">שמור</button>
                    <button class="btn-cancel" onclick="closeStatusModal()">ביטול</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
